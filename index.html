<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="เว็บไซต์โปรไฟล์ Teerasak Komparw พร้อมฉาก 3D movement สร้างด้วย Vite และ Three.js"
    />
    <title>Teerasak Komparw | Facebook Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800;900&family=Roboto:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <aside class="side-nav" aria-label="Main navigation">
      <a class="brand-link" href="#home" aria-label="Go to home">
        <span class="brand-mark">
          <img class="brand-logo" src="./assets/atrsk-wide-logo.png" alt="ATRSK" />
        </span>
        <span class="brand-text">
          <strong>Teerasak</strong>
          <small>Portfolio</small>
        </span>
      </a>

      <nav class="nav-menu">
        <a class="nav-item is-active" href="#home">
          <i data-lucide="home" aria-hidden="true"></i>
          <span>Home</span>
        </a>

        <div class="nav-group">
          <button class="nav-item nav-toggle" type="button" aria-expanded="true" aria-controls="project-menu">
            <i data-lucide="folder-kanban" aria-hidden="true"></i>
            <span>Project</span>
            <i class="chevron" data-lucide="chevron-down" aria-hidden="true"></i>
          </button>

          <ul id="project-menu" class="sub-menu" aria-label="Project filters">
            <li><a class="sub-item is-selected" href="#project-all">All</a></li>
            <li><a class="sub-item" href="#project-makan">Makan</a></li>
            <li><a class="sub-item" href="#project-munista">Munista</a></li>
            <li><a class="sub-item" href="#project-jobnista">Jobnista</a></li>
          </ul>
        </div>
      </nav>
    </aside>

    <main class="site-shell">
      <section id="home" class="comparison-hero" aria-label="Image reveal">
        <div class="comparison-stage" data-compare>
          <img class="comparison-image comparison-color" src="./assets/hero-color.png" alt="" />
          <div class="comparison-layer" aria-hidden="true">
            <img class="comparison-image comparison-bw" src="./assets/hero-color.png" alt="" />
          </div>
          <div class="comparison-divider" aria-hidden="true">
            <span class="comparison-handle"></span>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
